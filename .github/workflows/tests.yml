name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TEST_DEPS: >-
    "fastapi>=0.111.0" "python-multipart>=0.0.9"
    httpx numpy requests slowapi pytest openai

jobs:

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/server_requirements.txt
      - run: pip install ${{ env.TEST_DEPS }}
      - run: |
          python -m pytest \
            tests/test_api.py \
            tests/test_guardrails.py \
            tests/test_llm.py \
            tests/test_main_helpers.py \
            tests/test_session.py \
            tests/test_stt.py \
            tests/test_tts.py \
            -v --tb=short

  test-image-search:
    name: Image Search Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/server_requirements.txt
      - run: pip install ${{ env.TEST_DEPS }}
      - run: python -m pytest tests/test_image_search.py -v --tb=short

  test-pi-client:
    name: Pi Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/server_requirements.txt
      - run: pip install ${{ env.TEST_DEPS }}
      - run: |
          python -m pytest \
            tests/test_display_volume.py \
            tests/test_gui_logic.py \
            tests/test_volume.py \
            -v --tb=short
