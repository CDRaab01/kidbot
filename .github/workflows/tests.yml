name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/server_requirements.txt

      - name: Install test dependencies
        run: |
          pip install \
            fastapi>=0.111.0 \
            python-multipart>=0.0.9 \
            httpx \
            numpy \
            requests \
            slowapi \
            pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
